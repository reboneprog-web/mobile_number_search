<!DOCTYPE html>
<html>
<head>
<title>Mobile Number Search</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4e73df,#1cc88a);
}

.card{
background:white;
padding:40px;
width:350px;
border-radius:15px;
box-shadow:0 15px 30px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
color:#333;
}

.input-group{
display:flex;
margin-bottom:15px;
}

input{
flex:1;
padding:12px;
border-radius:8px 0 0 8px;
border:1px solid #ddd;
outline:none;
font-size:14px;
}

button{
padding:12px 15px;
border:none;
background:#4e73df;
color:white;
border-radius:0 8px 8px 0;
cursor:pointer;
}

button:hover{
background:#2e59d9;
}

#result{
margin-top:15px;
font-weight:bold;
color:#444;
}
</style>
</head>

<body>

<!-- LOGIN BOX -->
<div class="card" id="loginBox">
<h2>🔒 Enter Password</h2>

<input type="password" id="passwordInput" placeholder="Enter password" style="width:100%;margin-bottom:10px;border-radius:8px;border:1px solid #ddd;padding:12px">

<button onclick="checkPassword()" style="width:100%;border-radius:8px">Enter</button>

<p id="error" style="color:red;margin-top:10px;"></p>
</div>


<!-- MAIN SITE -->
<div class="card" id="siteContent" style="display:none;">

<h2>📱 Mobile Search</h2>

<div class="input-group">
<input type="text" id="searchInput" placeholder="Enter mobile number">
<button onclick="searchNumber()">Search</button>
</div>

<div id="result"></div>

</div>


<script>

const PASSWORD = "mypassword123"; // change password

function checkPassword(){

const entered=document.getElementById("passwordInput").value;

if(entered===PASSWORD){

document.getElementById("loginBox").style.display="none";
document.getElementById("siteContent").style.display="block";

}else{

document.getElementById("error").innerText="Wrong password";

}

}



function searchNumber(){

const input=document.getElementById("searchInput").value.trim();
const resultDiv=document.getElementById("result");

if(input===""){

resultDiv.innerHTML="⚠ Please enter mobile number";
return;

}

resultDiv.innerHTML="🔍 Searching...";

const url = "https://script.google.com/macros/s/AKfycbxuQEuhAfPsdF2UdLL4vs76ctVx2ccgyA34lYXZTllQfaxldGWaeySCPGnS6rhT9s6ieA/exec?mobile=" + encodeURIComponent(input);

fetch(url)
.then(response=>response.json())
.then(data=>{

if(data.error){

resultDiv.innerHTML="❌ Mobile number not found";

}else{

resultDiv.innerHTML="✅ Name: "+data.name;

}

})
.catch(error=>{

resultDiv.innerHTML="⚠ Error connecting to database";

});

}

</script>

</body>
</html>
